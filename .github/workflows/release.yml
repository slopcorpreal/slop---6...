name: Release binaries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vMAJOR.MINOR.PATCH)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            binary_name: chronosub
          - os: macos-latest
            artifact_suffix: macos-x86_64
            binary_name: chronosub
          - os: windows-latest
            artifact_suffix: windows-x86_64
            binary_name: chronosub.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Validate tag minor equals commit count
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          fi
          TAG_MINOR="$(echo "$TAG" | sed -E 's/^v[0-9]+\.([0-9]+)\.[0-9]+$/\1/')"
          COMMIT_COUNT="$(git rev-list --count HEAD)"
          if [ "$TAG_MINOR" != "$COMMIT_COUNT" ]; then
            echo "Tag minor ($TAG_MINOR) must match commit count ($COMMIT_COUNT)."
            exit 1
          fi

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "chronosub-${{ matrix.artifact_suffix }}.zip" "${{ matrix.binary_name }}"
          else
            tar -czf "chronosub-${{ matrix.artifact_suffix }}.tar.gz" "${{ matrix.binary_name }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: chronosub-${{ matrix.artifact_suffix }}
          path: dist/*

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/**/*
