name: Release binaries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.compute.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: compute
        name: Compute release tag
        shell: bash
        run: |
          VERSION="$(sed -nE 's/^version = "([0-9]+)\.[0-9]+\.[0-9]+"$/\1/p' Cargo.toml | head -n1)"
          PATCH="$(sed -nE 's/^version = "[0-9]+\.[0-9]+\.([0-9]+)"$/\1/p' Cargo.toml | head -n1)"
          COMMIT_COUNT="$(git rev-list --count HEAD)"
          TAG="v${VERSION}.${COMMIT_COUNT}.${PATCH}"
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "push" ] && [ "${GITHUB_REF_NAME}" != "$TAG" ]; then
            echo "Pushed tag (${GITHUB_REF_NAME}) must match computed tag (${TAG})."
            exit 1
          fi

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x86_64
            binary_name: chronosub
          - os: macos-latest
            artifact_suffix: macos-x86_64
            binary_name: chronosub
          - os: windows-latest
            artifact_suffix: windows-x86_64
            binary_name: chronosub.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          cd dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "chronosub-${{ matrix.artifact_suffix }}.zip" "${{ matrix.binary_name }}"
          else
            tar -czf "chronosub-${{ matrix.artifact_suffix }}.tar.gz" "${{ matrix.binary_name }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: chronosub-${{ matrix.artifact_suffix }}
          path: dist/*

  publish-release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.release_tag }}
          files: dist/**/*
