name: Publish crate

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify release tag and commit count policy
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          fi
          TAG_MINOR="$(echo "$TAG" | sed -E 's/^v[0-9]+\.([0-9]+)\.[0-9]+$/\1/')"
          COMMIT_COUNT="$(git rev-list --count HEAD)"
          if [ "$TAG_MINOR" != "$COMMIT_COUNT" ]; then
            echo "Tag minor ($TAG_MINOR) must match commit count ($COMMIT_COUNT)."
            exit 1
          fi
      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
