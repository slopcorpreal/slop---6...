name: Publish crate

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Compute expected release tag
        id: compute_tag
        shell: bash
        run: |
          VERSION="$(sed -nE 's/^version = "([0-9]+)\.[0-9]+\.[0-9]+"$/\1/p' Cargo.toml | head -n1)"
          PATCH="$(sed -nE 's/^version = "[0-9]+\.[0-9]+\.([0-9]+)"$/\1/p' Cargo.toml | head -n1)"
          if [ -z "$VERSION" ] || [ -z "$PATCH" ]; then
            echo "Unable to parse MAJOR/PATCH from Cargo.toml version."
            exit 1
          fi
          COMMIT_COUNT="$(git rev-list --count HEAD)"
          TAG="v${VERSION}.${COMMIT_COUNT}.${PATCH}"
          echo "expected_tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Verify release tag policy
        if: ${{ github.event_name == 'release' }}
        shell: bash
        run: |
          EXPECTED="${{ steps.compute_tag.outputs.expected_tag }}"
          ACTUAL="${{ github.event.release.tag_name }}"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Release tag ($ACTUAL) must match computed tag ($EXPECTED)."
            exit 1
          fi
      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
